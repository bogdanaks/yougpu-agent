name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # Required by softprops/action-gh-release to create/update the release.
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build linux/amd64
        run: |
          VERSION="${{ steps.ver.outputs.version }}" make build-linux
          # Backend's cloud-init expects the exact filename "yougpu-agent-linux-amd64"
          # at <releaseDownloadURL>/<tag>/yougpu-agent-linux-amd64.
          mv bin/yougpu-agent-linux-amd64 bin/yougpu-agent-linux-amd64
          sha256sum bin/yougpu-agent-linux-amd64 > bin/yougpu-agent-linux-amd64.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag is the immutable URL piece; filename must match the constant in
          # cloud-init.generator.ts (otherwise existing VMs can't curl their agent).
          files: |
            bin/yougpu-agent-linux-amd64
            bin/yougpu-agent-linux-amd64.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
